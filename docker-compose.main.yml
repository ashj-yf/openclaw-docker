# OpenClaw 主服务
# 启动: docker compose -f docker-compose.yml -f docker-compose.main.yml up -d

services:
  openclaw:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ashj-yf/openclaw-docker}:${IMAGE_TAG:-latest}
    build:
      <<: &build-config
        context: ${OPENCLAW_SRC:-./openclaw-src}
        platforms:
          - linux/amd64
          - linux/arm64
      dockerfile: Dockerfile
      args:
        OPENCLAW_INSTALL_BROWSER: "1"
    container_name: openclaw
    hostname: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/app/data
      - openclaw-skills:/app/skills
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 3m
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  openclaw-data:
  openclaw-skills: