# OpenClaw 主服务
# 使用: docker compose -f docker-compose.main.yml up -d

services:
  openclaw:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ashj-yf/openclaw-docker}:${IMAGE_TAG:-latest}
    build:
      context: ${OPENCLAW_SRC:-./openclaw-src}
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
      args:
        OPENCLAW_INSTALL_BROWSER: "1"
    container_name: openclaw
    hostname: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
      - ./config:/home/node/.openclaw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 3m
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge
