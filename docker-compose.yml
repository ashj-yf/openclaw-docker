# OpenClaw Docker Compose - 基础配置
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.main.yml up -d

x-common-vars: &common-vars
  IMAGE_REGISTRY: ${IMAGE_REGISTRY:-ghcr.io}
  IMAGE_REPO: ${IMAGE_REPO:-ashj-yf/openclaw-docker}
  IMAGE_TAG: ${IMAGE_TAG:-latest}

x-build-config: &build-config
  context: ${OPENCLAW_SRC:-./openclaw-src}
  platforms:
    - linux/amd64
    - linux/arm64