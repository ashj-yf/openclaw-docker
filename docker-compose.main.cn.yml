# OpenClaw 主服务（国内镜像）
# 使用: docker compose -f docker-compose.main.cn.yml up -d

services:
  openclaw:
    image: swr.cn-north-4.myhuaweicloud.com/openclaw-docker/openclaw:latest
    container_name: openclaw
    hostname: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
      - ./config:/home/node/.openclaw
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 3m
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge

