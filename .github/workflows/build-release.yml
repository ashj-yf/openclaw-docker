name: Build and Release Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: true
      download_url:
        description: 'Source code tarball URL'
        required: true
      release_html_url:
        description: 'Official release HTML URL'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  HUAWEI_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  HUAWEI_ORG: openclaw-docker
  HUAWEI_IMAGE: openclaw

jobs:
  # 创建初始 Release
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ inputs.version }}';
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `OpenClaw ${version}（构建中...）`,
              body: `## OpenClaw ${version}\n\n**状态**: 构建进行中...\n\n- [ ] 镜像构建\n- [ ] 翻译完成\n\n> 原文：[OpenClaw Official Release](${{ inputs.release_html_url }})`,
              draft: false,
              prerelease: false
            });
            return release.data.id.toString();

  # 构建主镜像
  build-main:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push main image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:latest
          push: true
          provenance: false

      - name: Update release with main digest
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const digest = '${{ steps.build-push.outputs.digest }}';

            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            });

            let body = release.data.body;
            body += `\n\n### 镜像 Digest\n\n| 镜像 | Digest |\n|------|--------|\n| 主镜像 | \`${digest}\` |`;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: body
            });

  # 构建 Sandbox 镜像
  build-sandbox:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox
          push: true
          provenance: false

  # 构建 Sandbox Browser 镜像
  build-sandbox-browser:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-browser image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-browser
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-browser-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-browser
          push: true
          provenance: false

  # 构建 Sandbox Common 镜像
  build-sandbox-common:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-common image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-common
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-common-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-common
          push: true
          provenance: false

  # 翻译 Release Notes
  translate-release:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      translated_body: ${{ steps.finalize.outputs.translated_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch release notes
        id: fetch-notes
        run: |
          VERSION="${{ inputs.version }}"
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openclaw/openclaw/releases/tags/${VERSION}")
          echo "$response" | jq -r '.body' > release_notes.txt
          echo "release_notes_file=release_notes.txt" >> $GITHUB_OUTPUT

      - name: Translate release notes to Chinese
        id: translate
        run: |
          echo "=== 检查翻译配置 ==="

          # 优先使用阿里云百炼大模型翻译
          if [ -n "${{ secrets.DASHSCOPE_API_KEY }}" ]; then
            echo "使用阿里云百炼大模型翻译"
            export DASHSCOPE_API_KEY="${{ secrets.DASHSCOPE_API_KEY }}"
            if [ -n "${{ secrets.DASHSCOPE_MODEL }}" ]; then
              export DASHSCOPE_MODEL="${{ secrets.DASHSCOPE_MODEL }}"
            else
              export DASHSCOPE_MODEL="qwen-turbo"
            fi
            echo "DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:0:8}..."
            echo "DASHSCOPE_MODEL: ${DASHSCOPE_MODEL}"

            if python3 scripts/translate_with_bailian.py release_notes.txt en zh > translated_notes.txt 2>&1; then
              echo "✓ 翻译成功"
            else
              echo "✗ 翻译失败，检查错误日志"
              cat translated_notes.txt
              exit 1
            fi
          elif [ -n "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" ]; then
            echo "使用阿里云机器翻译 API"
            export ALIYUN_ACCESS_KEY_ID="${{ secrets.ALIYUN_ACCESS_KEY_ID }}"
            export ALIYUN_ACCESS_KEY_SECRET="${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

            if python3 scripts/translate.py release_notes.txt en zh > translated_notes.txt 2>&1; then
              echo "✓ 翻译成功"
            else
              echo "✗ 翻译失败，检查错误日志"
              cat translated_notes.txt
              exit 1
            fi
          else
            echo "⚠ 未配置翻译 API，使用原文"
            cat release_notes.txt > translated_notes.txt
          fi
          echo "translated_notes_file=translated_notes.txt" >> $GITHUB_OUTPUT

      - name: Generate translated body and update release
        id: finalize
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const version = '${{ inputs.version }}';
            const releaseHtmlUrl = '${{ inputs.release_html_url }}';

            const translatedNotes = fs.readFileSync('translated_notes.txt', 'utf8');

            const body = [
              `## OpenClaw ${version}（中文版）`,
              '',
              `> 原文：[OpenClaw Official Release](${releaseHtmlUrl})`,
              '',
              '### 更新内容',
              '',
              translatedNotes,
              '',
              '---',
              '',
              '**镜像构建状态**: 已完成\n**翻译状态**: 已完成'
            ].join('\n');

            // Update release name and body
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: `OpenClaw ${version}（中文版）`,
              body: body
            });

            console.log('Release updated with translation');
            return body;

  # 最终更新：合并所有镜像 digest 和翻译内容
  finalize-release:
    needs: [create-release, build-main, build-sandbox, build-sandbox-browser, build-sandbox-common, translate-release]
    runs-on: ubuntu-latest
    steps:
      - name: Finalize release with all digests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const version = '${{ inputs.version }}';
            const releaseHtmlUrl = '${{ inputs.release_html_url }}';

            const translatedNotes = process.env.TRANSLATED_NOTES || '';

            const digests = {
              main: '${{ needs.build-main.outputs.digest }}',
              sandbox: '${{ needs.build-sandbox.outputs.digest }}',
              sandboxBrowser: '${{ needs.build-sandbox-browser.outputs.digest }}',
              sandboxCommon: '${{ needs.build-sandbox-common.outputs.digest }}'
            };

            // Get current release body (from translation step)
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            });

            let body = release.data.body || '';

            // Add image digest section
            body += '\n\n---\n\n## 镜像信息\n\n所有镜像支持 `amd64` 和 `arm64` 架构。\n\n';
            body += '| 镜像 | 标签 | Digest |\n';
            body += '|------|------|--------|\n';
            body += `| 主镜像 | \`${version}\`, \`latest\` | \`${digests.main}\` |\n`;
            body += `| Sandbox | \`sandbox-${version}\`, \`sandbox\` | \`${digests.sandbox}\` |\n`;
            body += `| Sandbox Browser | \`sandbox-browser-${version}\`, \`sandbox-browser\` | \`${digests.sandboxBrowser}\` |\n`;
            body += `| Sandbox Common | \`sandbox-common-${version}\`, \`sandbox-common\` | \`${digests.sandboxCommon}\` |\n`;

            // Add usage section
            body += '\n### 快速使用\n\n';
            body += '```bash\n';
            body += '# 拉取主镜像\n';
            body += `docker pull ghcr.io/${context.repo.owner}/${context.repo.repo}:latest\n\n`;
            body += '# 使用 docker-compose 启动\n';
            body += `curl -O https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/docker-compose.main.yml\n`;
            body += 'docker compose -f docker-compose.main.yml up -d\n';
            body += '```\n';

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: body
            });

            console.log('Release finalized successfully');
