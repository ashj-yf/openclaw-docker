name: Translate and Update Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: true
      release_html_url:
        description: 'Official release HTML URL'
        required: true
  workflow_call:
    inputs:
      version:
        description: 'OpenClaw version'
        required: true
        type: string
      release_html_url:
        description: 'Official release HTML URL'
        required: true
        type: string

permissions:
  contents: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  translate-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch full release notes from GitHub API
        id: fetch-notes
        run: |
          VERSION="${{ inputs.version }}"
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openclaw/openclaw/releases/tags/${VERSION}")

          echo "$response" | jq -r '.body' > release_notes.txt
          echo "release_notes_file=release_notes.txt" >> $GITHUB_OUTPUT

      - name: Translate release notes to Chinese
        id: translate
        run: |
          # 优先使用阿里云百炼大模型翻译
          if [ -n "${{ secrets.DASHSCOPE_API_KEY }}" ]; then
            export DASHSCOPE_API_KEY="${{ secrets.DASHSCOPE_API_KEY }}"
            if [ -n "${{ secrets.DASHSCOPE_MODEL }}" ]; then
              export DASHSCOPE_MODEL="${{ secrets.DASHSCOPE_MODEL }}"
            else
              export DASHSCOPE_MODEL="qwen-turbo"
            fi

            python3 scripts/translate_with_bailian.py release_notes.txt en zh > translated_notes.txt

            echo "使用阿里云百炼模型翻译完成"

          # 降级到阿里云机器翻译 API
          elif [ -n "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" ]; then
            export ALIYUN_ACCESS_KEY_ID="${{ secrets.ALIYUN_ACCESS_KEY_ID }}"
            export ALIYUN_ACCESS_KEY_SECRET="${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

            python3 scripts/translate.py release_notes.txt en zh > translated_notes.txt

            echo "使用阿里云机器翻译 API 翻译完成"
          else
            echo "> 以下为官方原文（暂未翻译）：" > translated_notes.txt
            echo "" >> translated_notes.txt
            cat release_notes.txt >> translated_notes.txt

            echo "未配置翻译 API，使用原文"
          fi

          echo "translated_notes_file=translated_notes.txt" >> $GITHUB_OUTPUT

      - name: Get existing release info
        id: get-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ inputs.version }}'
            });

            const body = release.data.body;
            const releaseId = release.data.id;

            // Extract digest info from existing body (preserve technical data)
            const digestMatch = body.match(/### 镜像 Digest\s*\n\s*\|.*?\n\s*\|.*?\n((?:\s*\|.*?\n)+)/);
            const digestSection = digestMatch ? digestMatch[0] : '';

            // Extract image info section
            const imageMatch = body.match(/## 镜像信息[\s\S]*?### 快速使用/);
            const imageSection = imageMatch ? imageMatch[0].replace(/### 快速使用$/, '') : '';

            // Write to files
            fs.writeFileSync('release_id.txt', String(releaseId));
            fs.writeFileSync('digest_section.txt', digestSection);
            fs.writeFileSync('image_section.txt', imageSection);

            console.log(`Release ID: ${releaseId}`);

      - name: Generate updated release body
        id: generate-body
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_HTML_URL="${{ inputs.release_html_url }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          REPO="${{ github.repository }}"

          # Create release body using printf to avoid heredoc issues
          printf '## OpenClaw %s（中文版）\n\n' "$VERSION" > release_body.md
          printf '> 原文：[OpenClaw Official Release](%s)\n\n' "$RELEASE_HTML_URL" >> release_body.md
          printf '### 更新内容\n\n' >> release_body.md
          cat translated_notes.txt >> release_body.md
          printf '\n---\n\n' >> release_body.md
          cat image_section.txt >> release_body.md
          printf '\n### 快速使用\n\n' >> release_body.md
          printf '```bash\n' >> release_body.md
          printf '# 拉取主镜像\n' >> release_body.md
          printf 'docker pull %s:latest\n\n' "$IMAGE_NAME" >> release_body.md
          printf '# 使用 docker-compose 启动\n' >> release_body.md
          printf 'curl -O https://raw.githubusercontent.com/%s/main/docker-compose.main.yml\n' "$REPO" >> release_body.md
          printf 'docker compose -f docker-compose.main.yml up -d\n' >> release_body.md
          printf '```\n\n' >> release_body.md
          cat digest_section.txt >> release_body.md

          echo "Release body generated successfully"

      - name: Update release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_body.md', 'utf8');
            const releaseId = parseInt(fs.readFileSync('release_id.txt', 'utf8'), 10);
            const version = '${{ inputs.version }}';

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: `OpenClaw ${version}（中文版）`,
              body: body
            });

            console.log('Release updated successfully');