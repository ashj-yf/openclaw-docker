name: Translate Release Notes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: false
      release_html_url:
        description: 'Official release HTML URL'
        required: false

permissions:
  contents: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DASHSCOPE_MODEL: ${{ vars.DASHSCOPE_MODEL || 'qwen-turbo' }}

jobs:
  # 如果未提供参数，获取最新 release 信息
  fetch-latest:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.fetch.outputs.version }}
      release_html_url: ${{ steps.fetch.outputs.release_html_url }}
    steps:
      - name: Fetch latest release from openclaw/openclaw
        id: fetch
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "使用手动输入的参数"
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "release_html_url=${{ inputs.release_html_url }}" >> $GITHUB_OUTPUT
          else
            echo "未提供参数，获取最新 release..."
            response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/openclaw/openclaw/releases/latest")

            echo "version=$(echo "$response" | jq -r '.tag_name')" >> $GITHUB_OUTPUT
            echo "release_html_url=$(echo "$response" | jq -r '.html_url')" >> $GITHUB_OUTPUT

            echo "获取到最新版本：$(echo "$response" | jq -r '.tag_name')"
          fi

  translate-release:
    runs-on: ubuntu-latest
    needs: fetch-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch release notes
        id: fetch-notes
        run: |
          VERSION="${{ needs.fetch-latest.outputs.version }}"
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openclaw/openclaw/releases/tags/${VERSION}")
          echo "$response" | jq -r '.body' > release_notes.txt
          echo "release_notes_file=release_notes.txt" >> $GITHUB_OUTPUT

      - name: Translate release notes to Chinese
        id: translate
        run: |
          echo "=== 检查翻译配置 ==="

          # 优先使用阿里云百炼大模型翻译
          if [ -n "${{ secrets.DASHSCOPE_API_KEY }}" ]; then
            echo "使用阿里云百炼大模型翻译"
            export DASHSCOPE_API_KEY="${{ secrets.DASHSCOPE_API_KEY }}"
            export DASHSCOPE_MODEL="${{ env.DASHSCOPE_MODEL }}"
            echo "DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:0:8}..."
            echo "DASHSCOPE_MODEL: ${DASHSCOPE_MODEL}"

            if python3 scripts/translate_with_bailian.py release_notes.txt en zh > translated_notes.txt; then
              echo "✓ 翻译成功"
            else
              echo "✗ 翻译失败，检查错误日志"
              cat translated_notes.txt
              exit 1
            fi
          elif [ -n "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" ]; then
            echo "使用阿里云机器翻译 API"
            export ALIYUN_ACCESS_KEY_ID="${{ secrets.ALIYUN_ACCESS_KEY_ID }}"
            export ALIYUN_ACCESS_KEY_SECRET="${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

            if python3 scripts/translate.py release_notes.txt en zh > translated_notes.txt; then
              echo "✓ 翻译成功"
            else
              echo "✗ 翻译失败，检查错误日志"
              cat translated_notes.txt
              exit 1
            fi
          else
            echo "⚠ 未配置翻译 API，使用原文"
            cat release_notes.txt > translated_notes.txt
          fi
          echo "translated_notes_file=translated_notes.txt" >> $GITHUB_OUTPUT

      - name: Update release with translation
        id: update-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const version = '${{ needs.fetch-latest.outputs.version }}';
            const releaseHtmlUrl = '${{ needs.fetch-latest.outputs.release_html_url }}';

            const translatedNotes = fs.readFileSync('translated_notes.txt', 'utf8');

            // Release should already exist (created by check-release workflow)
            let releaseId = null;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version
              });
              releaseId = existing.data.id;
              console.log(`Found existing release: ${existing.data.id}`);
            } catch (e) {
              if (e.status === 404) {
                // 理论上不应该发生，因为 check-release 已经创建了
                console.log('Release not found, creating new one...');
                const created = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: version,
                  name: `OpenClaw ${version}（中文版）`,
                  body: translatedNotes,
                  draft: false,
                  prerelease: false
                });
                releaseId = created.data.id;
                console.log(`Created new release: ${created.data.id}`);
              } else {
                throw e;
              }
            }

            if (!releaseId) {
              throw new Error('Release ID is null or undefined');
            }

            // Update release name and body with translation
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: `OpenClaw ${version}（中文版）`,
              body: translatedNotes
            });

            console.log('Release updated with Chinese translation');
