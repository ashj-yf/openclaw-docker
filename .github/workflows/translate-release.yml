name: Translate and Update Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: true
      release_html_url:
        description: 'Official release HTML URL'
        required: true
  workflow_call:
    inputs:
      version:
        description: 'OpenClaw version'
        required: true
        type: string
      release_html_url:
        description: 'Official release HTML URL'
        required: true
        type: string

permissions:
  contents: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  translate-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch full release notes from GitHub API
        id: fetch-notes
        run: |
          VERSION="${{ inputs.version }}"
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openclaw/openclaw/releases/tags/${VERSION}")

          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$response" | jq -r '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Translate release notes to Chinese
        id: translate
        run: |
          if [ -n "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" ]; then
            export ALIYUN_ACCESS_KEY_ID="${{ secrets.ALIYUN_ACCESS_KEY_ID }}"
            export ALIYUN_ACCESS_KEY_SECRET="${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

            translated=$(python3 scripts/translate.py "${{ steps.fetch-notes.outputs.release_notes }}" en zh)
          else
            translated="> 以下为官方原文（暂未翻译）：\n\n${{ steps.fetch-notes.outputs.release_notes }}"
          fi

          {
            echo "translated_notes<<EOF"
            echo "$translated"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Get existing release info
        id: get-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ inputs.version }}'
            });

            // Extract digest info from existing body (preserve technical data)
            const body = release.data.body;
            const digestMatch = body.match(/### 镜像 Digest\s*\n\s*\|.*?\n\s*\|.*?\n((?:\s*\|.*?\n)+)/);
            const digestSection = digestMatch ? digestMatch[0] : '';

            // Extract image info section
            const imageMatch = body.match(/## 镜像信息\s*\n((?:.*?\n)+?)\s*### 快速使用/);
            const imageSection = imageMatch ? imageMatch[0] : '';

            return {
              release_id: release.data.id,
              digest_section: digestSection,
              image_section: imageSection
            };

      - name: Generate updated release body
        id: generate-body
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_HTML_URL="${{ inputs.release_html_url }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          TRANSLATED="${{ steps.translate.outputs.translated_notes }}"
          DIGEST_SECTION="${{ fromJson(steps.get-release.outputs.result).digest_section }}"
          IMAGE_SECTION="${{ fromJson(steps.get-release.outputs.result).image_section }}"

          cat > release_body.md << EOF
          ## OpenClaw ${VERSION}（中文版）

          > 原文：[OpenClaw Official Release](${RELEASE_HTML_URL})

          ### 更新内容

          ${TRANSLATED}

          ---

          ${IMAGE_SECTION}

          ### 快速使用

          \`\`\`bash
          # 拉取主镜像
          docker pull ${IMAGE_NAME}:latest

          # 使用 docker-compose 启动
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.main.yml
          docker compose -f docker-compose.main.yml up -d
          \`\`\`

          ${DIGEST_SECTION}
          EOF

      - name: Update release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_body.md', 'utf8');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{
                fromJson(steps.get-release.outputs.result).release_id
              }},
              name: `OpenClaw ${{
                inputs.version
              }}（中文版）`,
              body: body
            });