name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: true
      download_url:
        description: 'Source code tarball URL'
        required: true
      release_notes:
        description: 'Official release notes'
        required: true
      release_html_url:
        description: 'Official release HTML URL'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # 构建主镜像
  build-main:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      translated_notes: ${{ steps.translate.outputs.translated_notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push main image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          push: true
          provenance: false

      - name: Translate release notes to Chinese
        id: translate
        run: |
          ORIGINAL_NOTES='${{ inputs.release_notes }}'

          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            translated=$(curl -s https://api.anthropic.com/v1/messages \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
              -H "anthropic-version: 2023-06-01" \
              -d '{
                "model": "claude-sonnet-4-20250514",
                "max_tokens": 4096,
                "messages": [{
                  "role": "user",
                  "content": "请将以下 OpenClaw release notes 翻译成中文，保持格式和结构，只翻译内容，不要添加额外说明：\n\n'"$ORIGINAL_NOTES"'"
                }]
              }' | jq -r '.content[0].text')
          else
            translated="> 以下为官方原文（暂未翻译）：\n\n${ORIGINAL_NOTES}"
          fi

          {
            echo "translated_notes<<EOF"
            echo "$translated"
            echo "EOF"
          } >> $GITHUB_OUTPUT

  # 构建 sandbox 基础镜像
  build-sandbox:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox
            ${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
          push: true
          provenance: false

  # 构建 sandbox-browser 镜像
  build-sandbox-browser:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-browser image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-browser
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser
          push: true
          provenance: false

  # 构建 sandbox-common 镜像（依赖 sandbox）
  build-sandbox-common:
    needs: build-sandbox
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-common image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-common
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common
          push: true
          provenance: false

  # 创建 Release
  create-release:
    needs: [build-main, build-sandbox, build-sandbox-browser, build-sandbox-common]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_HTML_URL: ${{ inputs.release_html_url }}
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release body
        run: |
          cat > release_body.md << EOF
          ## OpenClaw ${VERSION}（中文版）

          > 原文：[OpenClaw Official Release](${RELEASE_HTML_URL})

          ### 更新内容

          ${{ needs.build-main.outputs.translated_notes }}

          ---

          ## 镜像信息

          所有镜像支持 \`amd64\` 和 \`arm64\` 架构。

          | 镜像 | 标签 | 用途 |
          |------|------|------|
          | 主镜像 | \`${IMAGE_NAME}:latest\` | OpenClaw 主程序 |
          | Sandbox | \`${IMAGE_NAME}:sandbox\` | 基础沙盒容器 |
          | Sandbox Browser | \`${IMAGE_NAME}:sandbox-browser\` | 带浏览器的沙盒 |
          | Sandbox Common | \`${IMAGE_NAME}:sandbox-common\` | 完整开发环境沙盒 |

          ### 快速使用

          \`\`\`bash
          # 拉取主镜像
          docker pull ${IMAGE_NAME}:latest

          # 使用 docker-compose 启动
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
          docker compose up -d
          \`\`\`

          ### 镜像 Digest

          | 镜像 | Digest |
          |------|--------|
          | 主镜像 | \`${{ needs.build-main.outputs.digest }}\` |
          | Sandbox | \`${{ needs.build-sandbox.outputs.digest }}\` |
          | Sandbox Browser | \`${{ needs.build-sandbox-browser.outputs.digest }}\` |
          | Sandbox Common | \`${{ needs.build-sandbox-common.outputs.digest }}\` |
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: OpenClaw ${{ inputs.version }}（中文版）
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}