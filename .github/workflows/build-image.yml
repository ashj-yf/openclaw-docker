name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: false
      download_url:
        description: 'Source code tarball URL'
        required: false
      release_html_url:
        description: 'Official release HTML URL'
        required: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  HUAWEI_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  HUAWEI_ORG: openclaw-docker
  HUAWEI_IMAGE: openclaw

jobs:
  # 如果未提供参数，获取最新 release 信息
  fetch-latest:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.fetch.outputs.version }}
      download_url: ${{ steps.fetch.outputs.download_url }}
      release_html_url: ${{ steps.fetch.outputs.release_html_url }}
    steps:
      - name: Fetch latest release from openclaw/openclaw
        id: fetch
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "使用手动输入的参数"
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "download_url=${{ inputs.download_url }}" >> $GITHUB_OUTPUT
            echo "release_html_url=${{ inputs.release_html_url }}" >> $GITHUB_OUTPUT
          else
            echo "未提供参数，获取最新 release..."
            response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/openclaw/openclaw/releases/latest")

            echo "version=$(echo "$response" | jq -r '.tag_name')" >> $GITHUB_OUTPUT
            echo "download_url=$(echo "$response" | jq -r '.tarball_url')" >> $GITHUB_OUTPUT
            echo "release_html_url=$(echo "$response" | jq -r '.html_url')" >> $GITHUB_OUTPUT

            echo "获取到最新版本：$(echo "$response" | jq -r '.tag_name')"
          fi

  # 构建主镜像
  build-main:
    needs: fetch-latest
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ needs.fetch-latest.outputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push main image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          platforms: linux/amd64
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.fetch-latest.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:${{ needs.fetch-latest.outputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:latest
          push: true
          provenance: false

  # 更新 release
  finalize-build:
    runs-on: ubuntu-latest
    needs: [build-main, fetch-latest]
    steps:
      - name: Update release with digest
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ needs.fetch-latest.outputs.version }}';
            const digest = '${{ needs.build-main.outputs.digest }}';

            // Get existing release
            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version
              });
              release = existing.data;
            } catch (e) {
              if (e.status === 404) {
                console.log('Release not found, skipping digest update');
                return;
              }
              throw e;
            }

            // Append digest section to existing body
            let body = release.body || '';

            // Remove any existing digest section to avoid duplicates
            body = body.replace(/\n+---\n+## 📦 镜像信息[\s\S]*$/g, '');

            const digestSection = [
              '',
              '---',
              '',
              '## 📦 镜像信息',
              '',
              '镜像支持 `amd64` 和 `arm64` 架构。',
              '',
              '| 镜像 | 标签 | Digest |',
              '|------|------|--------|',
              `| 主镜像 | \`${version}\`, \`latest\` | \`${digest}\` |`,
              '',
              '### 🚀 快速使用',
              '',
              '```bash',
              '# 拉取主镜像（国内）',
              'docker pull swr.cn-north-4.myhuaweicloud.com/openclaw-docker/openclaw:latest',
              '',
              '# 拉取主镜像（国际）',
              `docker pull ghcr.io/${context.repo.owner}/${context.repo.repo}:latest`,
              '',
              '# 使用 docker-compose 启动',
              `curl -O https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/docker-compose.main.cn.yml`,
              'docker compose -f docker-compose.main.cn.yml up -d',
              '```'
            ].join('\n');

            body += digestSection;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: body
            });

            console.log('Release updated with digest');
