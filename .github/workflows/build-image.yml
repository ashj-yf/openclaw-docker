name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: true
      download_url:
        description: 'Source code tarball URL'
        required: true
      release_notes:
        description: 'Official release notes'
        required: true
      release_html_url:
        description: 'Official release HTML URL'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  KEEP_VERSIONS: 5  # 保留最近 5 个版本

env:
  REGISTRY: ghcr.io

jobs:
  # 构建主镜像
  build-main:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      translated_notes: ${{ steps.translate.outputs.translated_notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push main image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          push: true
          provenance: false

      - name: Translate release notes to Chinese
        id: translate
        run: |
          # 使用阿里云机器翻译
          if [ -n "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" ]; then
            export ALIYUN_ACCESS_KEY_ID="${{ secrets.ALIYUN_ACCESS_KEY_ID }}"
            export ALIYUN_ACCESS_KEY_SECRET="${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

            # 将 release notes 保存到文件（避免命令行参数过长）
            cat > /tmp/notes.txt << 'NOTES_EOF'
          ${{ inputs.release_notes }}
          NOTES_EOF

            # 执行翻译
            translated=$(python3 scripts/translate.py "$(cat /tmp/notes.txt)" en zh)
          else
            translated="> 以下为官方原文（暂未翻译）：\n\n${{ inputs.release_notes }}"
          fi

          {
            echo "translated_notes<<EOF"
            echo "$translated"
            echo "EOF"
          } >> $GITHUB_OUTPUT

  # 构建 sandbox 基础镜像
  build-sandbox:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox
            ${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
          push: true
          provenance: false

  # 构建 sandbox-browser 镜像
  build-sandbox-browser:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-browser image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-browser
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser
          push: true
          provenance: false

  # 构建 sandbox-common 镜像（依赖 sandbox）
  build-sandbox-common:
    needs: build-sandbox
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-common image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-common
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common
          push: true
          provenance: false

  # 创建 Release
  create-release:
    needs: [build-main, build-sandbox, build-sandbox-browser, build-sandbox-common]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_HTML_URL: ${{ inputs.release_html_url }}
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release body
        run: |
          cat > release_body.md << EOF
          ## OpenClaw ${VERSION}（中文版）

          > 原文：[OpenClaw Official Release](${RELEASE_HTML_URL})

          ### 更新内容

          ${{ needs.build-main.outputs.translated_notes }}

          ---

          ## 镜像信息

          所有镜像支持 \`amd64\` 和 \`arm64\` 架构。

          | 镜像 | 标签 | 用途 |
          |------|------|------|
          | 主镜像 | \`${IMAGE_NAME}:latest\` | OpenClaw 主程序 |
          | Sandbox | \`${IMAGE_NAME}:sandbox\` | 基础沙盒容器 |
          | Sandbox Browser | \`${IMAGE_NAME}:sandbox-browser\` | 带浏览器的沙盒 |
          | Sandbox Common | \`${IMAGE_NAME}:sandbox-common\` | 完整开发环境沙盒 |

          ### 快速使用

          \`\`\`bash
          # 拉取主镜像
          docker pull ${IMAGE_NAME}:latest

          # 使用 docker-compose 启动
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
          docker compose up -d
          \`\`\`

          ### 镜像 Digest

          | 镜像 | Digest |
          |------|--------|
          | 主镜像 | \`${{ needs.build-main.outputs.digest }}\` |
          | Sandbox | \`${{ needs.build-sandbox.outputs.digest }}\` |
          | Sandbox Browser | \`${{ needs.build-sandbox-browser.outputs.digest }}\` |
          | Sandbox Common | \`${{ needs.build-sandbox-common.outputs.digest }}\` |
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: OpenClaw ${{ inputs.version }}（中文版）
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 清理旧的镜像版本，只保留最近 5 个
  cleanup-versions:
    needs: create-release
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Clean up old package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const keepVersions = parseInt(process.env.KEEP_VERSIONS) || 5;
            const packageNames = [
              'openclaw-docker'
            ];

            for (const packageName of packageNames) {
              console.log(`Processing package: ${packageName}`);

              // 获取所有版本
              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByAuthenticatedUser,
                {
                  package_type: 'container',
                  package_name: packageName,
                  per_page: 100
                }
              );

              console.log(`Found ${versions.length} versions`);

              // 按创建时间排序（最新的在前）
              const sortedVersions = versions.sort((a, b) =>
                new Date(b.created_at) - new Date(a.created_at)
              );

              // 获取需要删除的版本（保留最新的 5 个）
              const versionsToDelete = sortedVersions.slice(keepVersions);

              console.log(`Keeping ${Math.min(versions.length, keepVersions)} versions, deleting ${versionsToDelete.length} versions`);

              // 删除旧版本
              for (const version of versionsToDelete) {
                try {
                  // 检查是否有标签，只删除带版本号标签的（如 v2026.4.9），不删除 latest/sandbox 等固定标签
                  const tags = version.metadata?.container?.tags || [];
                  const hasFixedTag = tags.some(tag =>
                    tag === 'latest' ||
                    tag === 'sandbox' ||
                    tag === 'sandbox-browser' ||
                    tag === 'sandbox-common' ||
                    tag === 'bookworm-slim'
                  );

                  if (hasFixedTag) {
                    console.log(`Skipping version ${version.id} with fixed tag: ${tags.join(', ')}`);
                    continue;
                  }

                  await github.rest.packages.deletePackageVersionForAuthenticatedUser({
                    package_type: 'container',
                    package_name: packageName,
                    package_version_id: version.id
                  });
                  console.log(`Deleted version ${version.id} (${tags.join(', ')})`);
                } catch (error) {
                  console.log(`Failed to delete version ${version.id}: ${error.message}`);
                }
              }
            }