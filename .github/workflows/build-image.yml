name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: true
      download_url:
        description: 'Source code tarball URL'
        required: true
      release_html_url:
        description: 'Official release HTML URL'
        required: true
      skip_release:
        description: 'Skip release creation and translation'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write
  actions: write

env:
  REGISTRY: ghcr.io
  HUAWEI_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  HUAWEI_ORG: openclaw-docker
  HUAWEI_IMAGE: openclaw
  KEEP_VERSIONS: 5

jobs:
  build-main:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push main image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:latest
          push: true
          provenance: false

  build-sandbox:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox
            ${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox
          push: true
          provenance: false

  build-sandbox-browser:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-browser image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-browser
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-browser-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-browser
          push: true
          provenance: false

  build-sandbox-common:
    needs: build-sandbox
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-common image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-common
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-common-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-common
          push: true
          provenance: false

  create-release:
    needs: [build-main, build-sandbox, build-sandbox-browser, build-sandbox-common]
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_release != 'true' }}
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_HTML_URL: ${{ inputs.release_html_url }}
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release (placeholder body)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: OpenClaw ${{ inputs.version }}
          body: |
            ## OpenClaw ${{ inputs.version }}（中文版）

            > 原文：[OpenClaw Official Release](${{ inputs.release_html_url }})

            ### 更新内容

            翻译进行中...

            ---

            ## 镜像信息

            所有镜像支持 `amd64` 和 `arm64` 架构。

            | 镜像 | 标签 | 用途 |
            |------|------|------|
            | 主镜像 | `${{ env.IMAGE_NAME }}:latest` | OpenClaw 主程序 |
            | Sandbox | `${{ env.IMAGE_NAME }}:sandbox` | 基础沙盒容器 |
            | Sandbox Browser | `${{ env.IMAGE_NAME }}:sandbox-browser` | 带浏览器的沙盒 |
            | Sandbox Common | `${{ env.IMAGE_NAME }}:sandbox-common` | 完整开发环境沙盒 |

            ### 快速使用

            ```bash
            # 拉取主镜像
            docker pull ${{ env.IMAGE_NAME }}:latest

            # 使用 docker-compose 启动
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.main.yml
            docker compose -f docker-compose.main.yml up -d
            ```

            ### 镜像 Digest

            | 镜像 | Digest |
            |------|--------|
            | 主镜像 | `${{ needs.build-main.outputs.digest }}` |
            | Sandbox | `${{ needs.build-sandbox.outputs.digest }}` |
            | Sandbox Browser | `${{ needs.build-sandbox-browser.outputs.digest }}` |
            | Sandbox Common | `${{ needs.build-sandbox-common.outputs.digest }}` |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger translation workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'translate-release.yml',
              ref: 'master',
              inputs: {
                version: '${{ inputs.version }}',
                release_html_url: '${{ inputs.release_html_url }}'
              }
            });

  cleanup-versions:
    needs: create-release
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_release != 'true' && success() }}

    steps:
      - name: Clean up old package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const keepVersions = parseInt(process.env.KEEP_VERSIONS) || 5;
            const packageNames = ['openclaw-docker'];

            for (const packageName of packageNames) {
              console.log(`Processing package: ${packageName}`);

              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByAuthenticatedUser,
                {
                  package_type: 'container',
                  package_name: packageName,
                  per_page: 100
                }
              );

              console.log(`Found ${versions.length} versions`);

              const sortedVersions = versions.sort((a, b) =>
                new Date(b.created_at) - new Date(a.created_at)
              );

              const versionsToDelete = sortedVersions.slice(keepVersions);

              console.log(`Keeping ${Math.min(versions.length, keepVersions)} versions, deleting ${versionsToDelete.length} versions`);

              for (const version of versionsToDelete) {
                try {
                  const tags = version.metadata?.container?.tags || [];
                  const hasFixedTag = tags.some(tag =>
                    tag === 'latest' ||
                    tag === 'sandbox' ||
                    tag === 'sandbox-browser' ||
                    tag === 'sandbox-common' ||
                    tag === 'bookworm-slim'
                  );

                  if (hasFixedTag) {
                    console.log(`Skipping version ${version.id} with fixed tag: ${tags.join(', ')}`);
                    continue;
                  }

                  await github.rest.packages.deletePackageVersionForAuthenticatedUser({
                    package_type: 'container',
                    package_name: packageName,
                    package_version_id: version.id
                  });
                  console.log(`Deleted version ${version.id} (${tags.join(', ')})`);
                } catch (error) {
                  console.log(`Failed to delete version ${version.id}: ${error.message}`);
                }
              }
            }