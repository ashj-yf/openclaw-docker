name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g. v1.2.3)'
        required: true
      download_url:
        description: 'Source code tarball URL'
        required: true
      release_html_url:
        description: 'Official release HTML URL'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  HUAWEI_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  HUAWEI_ORG: openclaw-docker
  HUAWEI_IMAGE: openclaw

jobs:
  # 构建主镜像
  build-main:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push main image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:latest
          push: true
          provenance: false

  # 构建 Sandbox 镜像
  build-sandbox:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox
          push: true
          provenance: false

  # 构建 Sandbox Browser 镜像
  build-sandbox-browser:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-browser image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-browser
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-browser
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-browser-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-browser
          push: true
          provenance: false

  # 构建 Sandbox Common 镜像
  build-sandbox-common:
    runs-on: ubuntu-latest
    needs: build-sandbox
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUAWEI_REGISTRY }}
          username: ${{ secrets.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Download OpenClaw source
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ inputs.download_url }}" -o openclaw-source.tar.gz
          mkdir -p openclaw-src
          tar -xzf openclaw-source.tar.gz -C openclaw-src --strip-components=1

      - name: Build and push sandbox-common image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-src
          file: openclaw-src/Dockerfile.sandbox-common
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:bookworm-slim
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common-${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sandbox-common
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-common-${{ inputs.version }}
            ${{ env.HUAWEI_REGISTRY }}/${{ env.HUAWEI_ORG }}/${{ env.HUAWEI_IMAGE }}:sandbox-common
          push: true
          provenance: false

  # 汇总所有镜像 digest
  finalize-build:
    runs-on: ubuntu-latest
    needs: [build-main, build-sandbox, build-sandbox-browser, build-sandbox-common]
    outputs:
      main_digest: ${{ steps.set-digests.outputs.main_digest }}
      sandbox_digest: ${{ steps.set-digests.outputs.sandbox_digest }}
      sandbox_browser_digest: ${{ steps.set-digests.outputs.sandbox_browser_digest }}
      sandbox_common_digest: ${{ steps.set-digests.outputs.sandbox_common_digest }}
    steps:
      - name: Output digests
        id: set-digests
        run: |
          echo "main_digest=${{ needs.build-main.outputs.digest }}" >> $GITHUB_OUTPUT
          echo "sandbox_digest=${{ needs.build-sandbox.outputs.digest }}" >> $GITHUB_OUTPUT
          echo "sandbox_browser_digest=${{ needs.build-sandbox-browser.outputs.digest }}" >> $GITHUB_OUTPUT
          echo "sandbox_common_digest=${{ needs.build-sandbox-common.outputs.digest }}" >> $GITHUB_OUTPUT
