name: Check OpenClaw Release

on:
  schedule:
    # 每 30 分钟检查一次
    - cron: '*/30 * * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read
  actions: write  # 触发其他 workflow

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Get OpenClaw latest release
        id: upstream
        run: |
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openclaw/openclaw/releases/latest")

          echo "version=$(echo "$response" | jq -r '.tag_name')" >> $GITHUB_OUTPUT
          echo "download_url=$(echo "$response" | jq -r '.tarball_url')" >> $GITHUB_OUTPUT
          echo "release_html_url=$(echo "$response" | jq -r '.html_url')" >> $GITHUB_OUTPUT

      - name: Check if release already processed
        id: check
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          # 检查本仓库是否已有该版本的 release
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}")

          if echo "$response" | jq -e '.id' > /dev/null 2>&1; then
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            echo "Release ${VERSION} already exists in this repo, skipping."
          else
            echo "has_new_release=true" >> $GITHUB_OUTPUT
            echo "New release ${VERSION} found, will trigger build and translate."
          fi

      - name: Trigger build workflow
        if: steps.check.outputs.has_new_release == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-image.yml
          inputs: |
            {
              "version": "${{ steps.upstream.outputs.version }}",
              "download_url": "${{ steps.upstream.outputs.download_url }}",
              "release_html_url": "${{ steps.upstream.outputs.release_html_url }}"
            }
          ref: master

      - name: Trigger translate workflow
        if: steps.check.outputs.has_new_release == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: translate-release.yml
          inputs: |
            {
              "version": "${{ steps.upstream.outputs.version }}",
              "release_html_url": "${{ steps.upstream.outputs.release_html_url }}"
            }
          ref: master
